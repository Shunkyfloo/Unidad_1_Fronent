<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Registro - Club Deportivo</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            /* Reset y estilos base */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            /* Fondo oscuro global */
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #000;
                min-height: 100vh;
                color: #f5f5f5;
            }

            /* Header */
            header {
                background: #111;
                padding: 80px 30px 40px;
                text-align: center;
                box-shadow: 0 2px 10px rgba(255, 255, 255, 0.08);
                position: relative;
                color: #f5f5f5;
            }

            /* Logo en esquina superior izquierda */
            .logo {
                position: absolute;
                top: 20px;
                left: 20px;
                max-width: 160px;
                height: auto;
            }

            /* Tipografía - Títulos */
            h1 {
                color: #fff;
                font-size: 48px;
                font-weight: 700;
                margin-bottom: 20px;
            }

            h2 {
                color: #e6e6e6;
                font-size: 28px;
                font-weight: 600;
                margin-bottom: 15px;
            }

            /* Navegación con márgenes y padding */
            nav a {
                display: inline-block;
                margin: 0 20px;
                padding: 12px 24px;
                background: #38bdf8;
                color: #000;
                text-decoration: none;
                border-radius: 25px;
                transition: all 0.3s ease;
                font-weight: 600;
                font-size: 14px;
            }

            nav a:hover {
                background: #5eead4;
                color: #000;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
            }

            /* Main content */
            h1 {
                color: #fff;
                font-size: 48px;
                font-weight: 700;
                margin-bottom: 20px;
            }

            h2 {
                color: #e6e6e6;
                font-size: 28px;
                font-weight: 600;
                margin-bottom: 15px;
            }

            /* Main content */
            main {
                max-width: 600px;
                margin: 50px auto;
                padding: 0 20px;
            }

            /* Sección del formulario */
            section {
                background: #1a1a1a;
                padding: 40px;
                border-radius: 15px;
                border: 1px solid #333;
                box-shadow: 0 8px 25px rgba(255, 255, 255, 0.08);
                overflow: hidden;
            }

            /* Contenedor del formulario */
            form {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            /* Inputs - márgenes, padding, bordes */
            input,
            select,
            button {
                padding: 14px 18px;
                border: 2px solid #ddd;
                border-radius: 8px;
                font-size: 16px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                transition: all 0.3s ease;
            }

            input,
            select {
                width: 100%;
                color: #f5f5f5;
                background-color: #222;
                border-color: #444;
            }

            input::placeholder {
                color: #aaa;
            }

            input:focus,
            select:focus {
                outline: none;
                border-color: #667eea;
                background-color: #fff;
                color: #000;
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
            }

            /* Checkbox styling */
            .checkbox-group {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .checkbox-group input[type="checkbox"] {
                width: auto;
                margin: 0;
            }

            .checkbox-group label {
                font-size: 16px;
                color: #f5f5f5;
            }

            /* Botón con estilos */
            button {
                padding: 14px 18px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 10px;
            }

            button:hover {
                background-color: #764ba2;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }

            #registerMensaje {
                margin-top: 10px;
                padding: 12px 14px;
                border-radius: 8px;
                border: 1px solid rgba(52, 211, 153, 0.35);
                background: rgba(16, 185, 129, 0.12);
                color: #34d399;
                display: none;
                font-size: 14px;
                line-height: 1.4;
            }

            #registerMensaje.visible {
                display: block;
            }

            .field-error {
                color: #fca5a5;
                font-size: 13px;
                margin-top: -12px;
            }

            .form-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 10px 6px;
                margin-top: 24px;
                margin-left: -40px;
                margin-right: -40px;
                margin-bottom: -40px;
                padding: 18px 16px 22px;
                text-align: center;
                background-color: #121212;
                border-top: 1px solid #2a2a2a;
                border-bottom: 1px solid #0a0a0a;
                font-family: "Press Start 2P", system-ui, sans-serif;
                font-size: 9px;
                line-height: 1.8;
                -webkit-font-smoothing: none;
                -moz-osx-font-smoothing: unset;
            }

            .form-links a {
                color: #00aeef;
                text-decoration: none;
                font-weight: normal;
                transition: color 0.15s ease, text-shadow 0.15s ease;
                text-shadow: 0 0 8px rgba(0, 174, 239, 0.35);
            }

            .form-links a:hover {
                color: #5ce1ff;
                text-shadow: 0 0 10px rgba(92, 225, 255, 0.5);
            }

            .form-links .form-links-sep {
                color: #d4d4d4;
                user-select: none;
                text-shadow: none;
            }

            /* Footer */
            footer {
                background: #2E1A47;
                text-align: center;
                padding: 20px;
                margin-top: 50px;
                box-shadow: 0 -2px 10px rgba(255, 255, 255, 0.08);
                font-size: 14px;
                color: #ccc;
            }

            /* Responsive */
            @media (max-width: 768px) {
                main {
                    margin: 20px auto;
                    padding: 0 15px;
                }

                section {
                    padding: 30px 20px;
                }

                .form-links {
                    margin-left: -20px;
                    margin-right: -20px;
                    margin-bottom: -30px;
                }

                h1 {
                    font-size: 36px;
                }

                h2 {
                    font-size: 24px;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <img src="sportclub-logo.png" alt="Logo Sport Club" class="logo">
            <h1>Club Deportivo</h1>
            <nav>
                <a href="#">Inicio</a>
                <a href="#">Planes</a>
                <a href="#">Reservas</a>
            </nav>
        </header>

        <main>
            <section>
                <h2>Regístrate en nuestro club</h2>
                <p>Únete a la comunidad deportiva más activa.</p>

                <form id="registerForm" novalidate>
                    <input id="fullName" type="text" placeholder="Nombre completo*" required autocomplete="name">
                    <p id="errFullName" class="field-error" role="alert"></p>

                    <input id="email" type="email" placeholder="Correo electrónico*" required autocomplete="email">
                    <p id="errEmail" class="field-error" role="alert"></p>

                    <input id="password" type="password" placeholder="Contraseña* (mín. 8, letras y números)" required autocomplete="new-password" minlength="8">
                    <p id="errPassword" class="field-error" role="alert"></p>

                    <input id="password2" type="password" placeholder="Repetir contraseña*" required autocomplete="new-password">
                    <p id="errPassword2" class="field-error" role="alert"></p>

                    <label for="birthDate" style="color:#cbd5e1;font-size:14px;">Fecha de nacimiento (opcional)</label>
                    <input id="birthDate" type="date" name="birthDate">
                    <p id="errBirthDate" class="field-error" role="alert"></p>

                    <button type="submit">Registrarse</button>
                </form>
                <div id="registerMensaje" role="status" aria-live="polite"></div>
                <div class="form-links">
                    <a href="index.html">Volver al login</a>
                </div>
            </section>
        </main>

        <footer>
            <p>Copyright 2024 - Club Deportivo</p>
        </footer>

        <script src="club-api.js"></script>
        <script src="register.js"></script>
    </body>
</html>
