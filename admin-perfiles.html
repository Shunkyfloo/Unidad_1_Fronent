<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Perfiles de usuarios — Admin</title>
        <link rel="stylesheet" href="dashboard-shell.css">
        <style>
            .admin-toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                align-items: center;
                margin-bottom: 14px;
            }
            .admin-toolbar select {
                background: #0f172a;
                color: #e2e8f0;
                border: 1px solid #334155;
                border-radius: 10px;
                padding: 8px 12px;
            }
            #adminUsersStatus {
                font-size: 13px;
                margin-bottom: 10px;
                color: #94a3b8;
            }
            dialog#adminUserDialog {
                border: none;
                border-radius: 16px;
                padding: 0;
                background: #0f172a;
                color: #e5e7eb;
                max-width: 480px;
                width: calc(100% - 32px);
            }
            dialog#adminUserDialog::backdrop {
                background: rgba(0, 0, 0, 0.65);
            }
            .admin-dialog-inner {
                padding: 22px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .admin-dialog-inner input,
            .admin-dialog-inner select {
                padding: 12px 14px;
                border-radius: 8px;
                border: 1px solid #334155;
                background: #020617;
                color: #f8fafc;
            }
            .admin-dialog-actions {
                display: flex;
                gap: 10px;
                justify-content: flex-end;
                margin-top: 8px;
            }
            .admin-dialog-actions button {
                padding: 10px 16px;
                border-radius: 999px;
                border: none;
                cursor: pointer;
                font-weight: 600;
            }
            #admDlgSave {
                background: #22c55e;
                color: #052e16;
            }
            #admDlgCancel {
                background: #334155;
                color: #e2e8f0;
            }
        </style>
    </head>
    <body>
        <header class="app-top">
            <div class="brand">
                <img src="sportclub-logo.png" alt="Club Deportivo">
                <h1>Perfiles de usuarios</h1>
            </div>
            <nav>
                <a class="nav-pill" href="admin-dashboard.html">Volver al panel</a>
                <a class="nav-pill primary" href="perfil.html">Editar perfil</a>
                <button type="button" class="logout-link" id="logout">Cerrar sesión</button>
            </nav>
        </header>
        <main class="shell-main">
            <div class="panel">
                <h2>Administrador: <span id="userName"></span></h2>
                <p class="lead">CRUD sobre la API <code style="color:#94a3b8;">/api/users</code>. No puedes eliminar tu propia sesión desde aquí.</p>
                <div class="admin-toolbar">
                    <label for="filterRole" style="color:#94a3b8;font-size:13px;">Filtrar por rol</label>
                    <select id="filterRole">
                        <option value="">Todos</option>
                        <option value="user">user</option>
                        <option value="coach">coach</option>
                        <option value="admin">admin</option>
                    </select>
                    <button type="button" id="btnNewUser" class="btn btn-primary">Nuevo usuario</button>
                </div>
                <p id="adminUsersStatus"></p>
                <p id="statLine" style="font-size:13px;color:#94a3b8;margin-bottom:10px;">Total listado: <span id="statTotalUsers">0</span></p>
                <table class="data">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </main>

        <dialog id="adminUserDialog">
            <div class="admin-dialog-inner">
                <h3 id="adminDlgTitle">Usuario</h3>
                <input type="hidden" id="admUserId">
                <label for="admFullName">Nombre completo</label>
                <input id="admFullName" type="text">
                <label for="admEmail">Correo</label>
                <input id="admEmail" type="email">
                <label for="admRole">Rol</label>
                <select id="admRole">
                    <option value="user">user</option>
                    <option value="coach">coach</option>
                    <option value="admin">admin</option>
                </select>
                <label for="admPassword">Contraseña</label>
                <input id="admPassword" type="password" placeholder="Obligatoria al crear; opcional al editar">
                <p id="admDlgMsg" style="min-height:1.2em;font-size:14px;color:#fca5a5;"></p>
                <div class="admin-dialog-actions">
                    <button type="button" id="admDlgCancel">Cancelar</button>
                    <button type="button" id="admDlgSave">Guardar</button>
                </div>
            </div>
        </dialog>

        <script src="club-api.js"></script>
        <script src="dashboard-auth.js"></script>
        <script src="admin-users.js"></script>
    </body>
</html>
