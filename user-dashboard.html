<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mi panel — Club Deportivo</title>
        <link rel="stylesheet" href="dashboard-shell.css">
    </head>
    <body>
        <header class="app-top">
            <div class="brand">
                <img src="sportclub-logo.png" alt="Club Deportivo">
                <h1>Mi panel</h1>
            </div>
            <nav>
                <a class="nav-pill primary" href="perfil.html">Editar perfil</a>
                <button type="button" class="logout-link" id="logout">Cerrar sesión</button>
            </nav>
        </header>
        <main class="shell-main">
            <div class="panel">
                <h2>Hola, <span id="userName"></span></h2>
                <p class="lead">Aquí ves solo tus reservas y tu avance. Los datos de ejemplo se guardan en tu navegador para la demo del laboratorio.</p>
                <div class="grid-2">
                    <section>
                        <h3 class="section-title">Mis reservas</h3>
                        <ul id="userReservasList" class="clean-list"></ul>
                    </section>
                    <section>
                        <h3 class="section-title">Mi avance</h3>
                        <div id="userAvanceWrap"></div>
                    </section>
                </div>
            </div>
        </main>
        <script src="club-api.js"></script>
        <script src="dashboard-auth.js"></script>
        <script src="user-dashboard.js"></script>
    </body>
</html>
