<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Panel coach — Club Deportivo</title>
        <link rel="stylesheet" href="dashboard-shell.css">
    </head>
    <body>
        <header class="app-top">
            <div class="brand">
                <img src="sportclub-logo.png" alt="Club Deportivo">
                <h1>Panel coach</h1>
            </div>
            <nav>
                <a class="nav-pill" href="coach-reservas.html">Reservas y alumnos</a>
                <a class="nav-pill primary" href="perfil.html">Editar perfil</a>
                <button type="button" class="logout-link" id="logout">Cerrar sesión</button>
            </nav>
        </header>
        <main class="shell-main">
            <div class="panel">
                <h2>Hola, <span id="userName"></span></h2>
                <p class="lead">Resumen rápido. La gestión detallada de reservas y participantes está en la sección dedicada.</p>
                <div class="grid-2">
                    <section>
                        <h3 class="section-title">Próximas reservas (vista rápida)</h3>
                        <ul id="coachResumenReservas" class="clean-list"></ul>
                    </section>
                    <section>
                        <h3 class="section-title">Avance del grupo</h3>
                        <div id="coachResumenAvance"></div>
                    </section>
                </div>
                <p class="lead" style="margin-top: 20px;">
                    <a class="nav-pill primary" href="coach-reservas.html" style="display: inline-flex;">Ir a reservas y organización de usuarios</a>
                </p>
            </div>
        </main>
        <script src="club-api.js"></script>
        <script src="dashboard-auth.js"></script>
        <script src="coach-dashboard.js"></script>
    </body>
</html>
