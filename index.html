<!DOCTYPE html>
<html lang="es">    
    <head>
        <meta charset="UTF-8">
        <title>Club Deportivo</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            /* Reset y estilos base */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            /* Fondo oscuro global */
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #000;
                min-height: 100vh;
                color: #f5f5f5;
            }

            /* Header */
            header {
                background: #111;
                padding: 80px 30px 40px; /* espacio superior extra para logo posicionado */
                text-align: center;
                box-shadow: 0 2px 10px rgba(255, 255, 255, 0.08);
                position: relative;
                color: #f5f5f5;
            }

            /* Logo en esquina superior izquierda */
            .logo {
                position: absolute;
                top: 20px;
                left: 20px;
                max-width: 140px;
                height: auto;
            }

            /* Tipografía - Títulos */
            h1 {
                color: #fff;
                font-size: 48px;
                font-weight: 700;
                margin-bottom: 20px;
            }

            h2 {
                color: #e6e6e6;
                font-size: 36px;
                font-weight: 600;
                margin-bottom: 20px;
            }

            p {
                color: #ddd;
            }

            /* Tipografía - Párrafos */
            p {
                font-size: 18px;
                color: #ddd;
                margin-bottom: 30px;
                line-height: 1.6;
            }

            /* Navegación con márgenes y padding */
            nav a {
                display: inline-block;
                margin: 0 20px;
                padding: 12px 24px;
                background: #667eea;
                color: white;
                text-decoration: none;
                border-radius: 25px;
                transition: all 0.3s ease;
                font-weight: 600;
                font-size: 14px;
            }

            nav a:hover {
                background: #764ba2;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }

            /* Contenedor centrado en pantalla */
            main {
                max-width: 600px;
                margin: 40px auto;
                padding: 0 20px;
            }

            /* Card del formulario */
            section {
                background: white;
                padding: 50px;
                margin: 20px;
                border-radius: 15px;
                border: 1px solid #e0e5ea;
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            }

            /* Contenedor del formulario */
            form {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            section {
                background: #1a1a1a;
                padding: 50px;
                margin: 20px;
                border-radius: 15px;
                border: 1px solid #333;
                box-shadow: 0 8px 25px rgba(255, 255, 255, 0.08);
                overflow: hidden;
            }

            nav a {
                display: inline-block;
                margin: 0 20px;
                padding: 12px 24px;
                background: #38bdf8;
                color: #000;
                text-decoration: none;
                border-radius: 25px;
                transition: all 0.3s ease;
                font-weight: 600;
                font-size: 14px;
            }

            nav a:hover {
                background: #5eead4;
                color: #000;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
            }

            /* Inputs - márgenes, padding, bordes */
            input,
            button {
                padding: 14px 18px;
                border: 2px solid #ddd;
                border-radius: 8px;
                font-size: 16px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                transition: all 0.3s ease;
            }

            input {
                width: 100%;
                color: #000;
                background-color: #fff;
                border-color: #444;
            }

            input::placeholder {
                color: #666;
            }

            input:focus {
                outline: none;
                border-color: #667eea;
                background-color: #fff;
                color: #000;
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
            }

            /* Botón con estilos */
            button {
                padding: 14px 18px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 10px;
            }

            button:hover {
                background-color: #764ba2;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            }

            /* Mensaje de ingreso */
            #ingresoMensaje {
                margin-top: 10px;
                padding: 12px 14px;
                border-radius: 8px;
                border: 1px solid rgba(52, 211, 153, 0.35);
                background: rgba(16, 185, 129, 0.12);
                color: #34d399;
                display: none;
                font-size: 14px;
                line-height: 1.4;
            }

            #ingresoMensaje.visible {
                display: block;
            }

            .form-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 10px 6px;
                margin-top: 24px;
                margin-left: -50px;
                margin-right: -50px;
                margin-bottom: -50px;
                padding: 18px 16px 22px;
                text-align: center;
                background-color: #121212;
                border-top: 1px solid #2a2a2a;
                border-bottom: 1px solid #0a0a0a;
                font-family: "Press Start 2P", system-ui, sans-serif;
                font-size: 9px;
                line-height: 1.8;
                -webkit-font-smoothing: none;
                -moz-osx-font-smoothing: unset;
            }

            .form-links a {
                color: #00aeef;
                text-decoration: none;
                font-weight: normal;
                transition: color 0.15s ease, text-shadow 0.15s ease;
                text-shadow: 0 0 8px rgba(0, 174, 239, 0.35);
            }

            .form-links a:hover {
                color: #5ce1ff;
                text-shadow: 0 0 10px rgba(92, 225, 255, 0.5);
            }

            .form-links .form-links-sep {
                color: #d4d4d4;
                user-select: none;
                text-shadow: none;
            }

            /* Footer */
            footer {
                background: #111;
                text-align: center;
                padding: 20px;
                margin-top: 50px;
                box-shadow: 0 -2px 10px rgba(255, 255, 255, 0.08);
                font-size: 14px;
                color: #ccc;
            }
        </style>
    </head>
    <body>
        <header>
            <img src="sportclub-logo.png" alt="Logo Sport Club" class="logo">
            <h1>Club Deportivo</h1>  
            <nav>
                <a href="#">Inicio</a>
                <a href="#">Planes</a>
                <a href="#">Reservas</a>
            </nav>
        </header>
        <main>
            <section>
                <h2>Bienvenido a mi club</h2>
                <p>Entrena con los mejores Profesionales.</p>
                
                <form autocomplete="on">
                    <input id="email" name="email" type="email" placeholder="Tu email..." required autocomplete="email">
                    <input id="password" name="password" type="password" placeholder="Tu contraseña..." required autocomplete="current-password">
                    <button type="submit">Ingresar</button>
                </form>
                <div id="ingresoMensaje" role="status" aria-live="polite"></div>
                <div class="form-links">
                    <a href="recover.html">¿Olvidaste tu contraseña?</a>
                    <span class="form-links-sep">|</span>
                    <a href="user-dashboard.html">Dashboard Usuario</a>
                    <span class="form-links-sep">|</span>
                    <a href="coach-dashboard.html">Dashboard Coach</a>
                    <span class="form-links-sep">|</span>
                    <a href="admin-dashboard.html">Dashboard Administrador</a>
                    <span class="form-links-sep">|</span>
                    <a href="register.html">Regístrate</a>
                </div>
            </section>
        </main>
        <footer>
            <p>Copyright 2024 - Club Deportivo</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
